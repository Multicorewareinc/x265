# Bitbucket Pipelines configuration for x265
# This pipeline builds x265 and runs tests on a daily schedule

image: ubuntu:22.04

definitions:
  caches:
    build: source/build

pipelines:
  # Default pipeline for manual runs and commits
  default:
    - step:
        name: Build and Test x265
        caches:
          - build
        script:
          # Install build dependencies
          - apt-get update
          - apt-get install -y 
              build-essential 
              cmake 
              nasm 
              yasm 
              git 
              libnuma-dev
          
          # Display versions for debugging
          - echo "=== Build Environment ==="
          - gcc --version
          - cmake --version
          - nasm --version
          
          # Build x265 (8-bit)
          - echo "=== Building x265 (8-bit) ==="
          - cd source
          - mkdir -p build
          - cd build
          - cmake -DCMAKE_BUILD_TYPE=Release -DENABLE_TESTS=ON -DENABLE_CLI=ON -DENABLE_SHARED=ON ..
          - make -j$(nproc)
          
          # Run unit tests
          - echo "=== Running Unit Tests ==="
          - echo "Running TestBench with default tests..."
          - ./test/TestBench --nobench && TEST_PASS=1 || TEST_RESULT=$?
          - |
            if [ "${TEST_PASS:-0}" -eq 1 ]; then
              echo "✓ All TestBench tests PASSED"
            else
              echo "✗ TestBench tests FAILED with exit code ${TEST_RESULT}"
              echo "Build will continue but tests need attention"
            fi
          
          # Test CLI binary
          - echo "=== Testing CLI Binary ==="
          - ./x265 --version
          - ./x265 --help
          
          # Functional encoding test
          - echo "=== Functional Encoding Test ==="
          - apt-get install -y ffmpeg
          - echo "Generating test YUV file..."
          - ffmpeg -f lavfi -i testsrc=duration=2:size=640x360:rate=30 -pix_fmt yuv420p test_640x360.yuv -y
          - ls -lh test_640x360.yuv
          - echo "Encoding with x265..."
          - ./x265 --input test_640x360.yuv --input-res 640x360 --fps 30 --preset fast --crf 28 --frames 60 -o test_output.hevc
          - ls -lh test_output.hevc
          - echo "✓ Encoding test completed successfully"
          
          # Display build artifacts
          - ls -lh x265
          - ls -lh libx265.so*
        artifacts:
          - source/build/x265
          - source/build/libx265.so*
          - source/build/test/TestBench

  # Multi-configuration build pipeline (8-bit, 10-bit, 12-bit)
  branches:
    master:
      - parallel:
          - step:
              name: Build x265 (8-bit)
              caches:
                - build
              script:
                - apt-get update
                - apt-get install -y build-essential cmake nasm yasm git libnuma-dev
                - echo "=== Building 8-bit ==="
                - cd source
                - mkdir -p build-8bit
                - cd build-8bit
                - cmake -DCMAKE_BUILD_TYPE=Release -DENABLE_TESTS=ON -DENABLE_CLI=ON -DENABLE_SHARED=ON ..
                - make -j$(nproc)
                - echo "Running TestBench correctness tests..."
                - ./test/TestBench --nobench && echo "✓ Tests PASSED" || echo "✗ Tests FAILED with code $?"
                - ./x265 --version
                - echo "Quick encoding test..."
                - apt-get install -y ffmpeg
                - ffmpeg -f lavfi -i testsrc=duration=1:size=320x240:rate=30 -pix_fmt yuv420p test.yuv -y
                - ./x265 --input test.yuv --input-res 320x240 --fps 30 --preset ultrafast --crf 28 --frames 30 -o test.hevc
                - echo "✓ Encoding functional"
              artifacts:
                - source/build-8bit/x265
                - source/build-8bit/libx265.so*

          - step:
              name: Build x265 (10-bit)
              script:
                - apt-get update
                - apt-get install -y build-essential cmake nasm yasm git libnuma-dev
                - echo "=== Building 10-bit ==="
                - cd source
                - mkdir -p build-10bit
                - cd build-10bit
                - cmake -DCMAKE_BUILD_TYPE=Release -DHIGH_BIT_DEPTH=ON -DENABLE_CLI=OFF -DENABLE_SHARED=OFF ..
                - make -j$(nproc)
                - ls -lh libx265.a
              artifacts:
                - source/build-10bit/libx265.a

          - step:
              name: Build x265 (12-bit)
              script:
                - apt-get update
                - apt-get install -y build-essential cmake nasm yasm git libnuma-dev
                - echo "=== Building 12-bit ==="
                - cd source
                - mkdir -p build-12bit
                - cd build-12bit
                - cmake -DCMAKE_BUILD_TYPE=Release -DHIGH_BIT_DEPTH=ON -DMAIN12=ON -DENABLE_CLI=OFF -DENABLE_SHARED=OFF ..
                - make -j$(nproc)
                - ls -lh libx265.a
              artifacts:
                - source/build-12bit/libx265.a

  # Daily scheduled builds with comprehensive testing
  custom:
    daily-build:
      - step:
          name: Daily Build and Comprehensive Test
          max-time: 60
          caches:
            - build
          script:
            # Install dependencies
            - apt-get update
            - apt-get install -y 
                build-essential 
                cmake 
                nasm 
                yasm 
                git 
                libnuma-dev
                wget
                time
            
            # System info
            - echo "=== System Information ==="
            - uname -a
            - cat /proc/cpuinfo | grep "model name" | head -1
            - free -h
            - df -h
            
            # Build info
            - echo "=== Build Environment ==="
            - gcc --version
            - g++ --version
            - cmake --version
            - nasm --version
            
            # Build 8-bit version with tests
            - echo "=== Building x265 (8-bit) with Tests ==="
            - cd source
            - mkdir -p build
            - cd build
            - cmake -DCMAKE_BUILD_TYPE=Release 
                -DENABLE_TESTS=ON 
                -DENABLE_CLI=ON 
                -DENABLE_SHARED=ON 
                -DENABLE_LIBNUMA=ON 
                -DENABLE_ASSEMBLY=ON 
                -DENABLE_PIC=ON 
                ..
            - time make -j$(nproc)
            
            # Run unit tests with detailed output
            - echo "=== Running Unit Tests ==="
            - echo "Available SIMD architectures:"
            - ./test/TestBench --cpuid list || true
            - echo ""
            - echo "Running correctness tests (no benchmarks)..."
            - ./test/TestBench --nobench || TEST_RESULT=$?
            - echo "TestBench correctness tests completed with exit code ${TEST_RESULT:-0}"
            - echo ""
            - echo "Running pixel benchmarks..."
            - ./test/TestBench --testbench pixel || true
            - echo ""
            - echo "Running transforms benchmarks..."
            - ./test/TestBench --testbench transforms || true
            
            # Test CLI with various options
            - echo "=== Testing CLI Binary ==="
            - ./x265 --version
            - ./x265 --help | head -20
            
            # Comprehensive encoding tests
            - echo "=== Comprehensive Encoding Tests ==="
            - apt-get install -y ffmpeg
            
            # Test 1: Basic 8-bit encoding
            - echo "Test 1: Basic 8-bit 640x360 encoding..."
            - ffmpeg -f lavfi -i testsrc=duration=3:size=640x360:rate=30 -pix_fmt yuv420p test_640x360.yuv -y
            - ./x265 --input test_640x360.yuv --input-res 640x360 --fps 30 --preset fast --crf 28 --frames 90 -o test1_fast.hevc
            - ls -lh test1_fast.hevc
            
            # Test 2: Different preset
            - echo "Test 2: Medium preset encoding..."
            - ./x265 --input test_640x360.yuv --input-res 640x360 --fps 30 --preset medium --crf 23 --frames 90 -o test2_medium.hevc
            - ls -lh test2_medium.hevc
            
            # Test 3: Bitrate mode
            - echo "Test 3: Bitrate control (CBR)..."
            - ./x265 --input test_640x360.yuv --input-res 640x360 --fps 30 --preset fast --bitrate 500 --frames 90 -o test3_cbr.hevc
            - ls -lh test3_cbr.hevc
            
            # Test 4: Two-pass encoding
            - echo "Test 4: Two-pass encoding..."
            - ./x265 --input test_640x360.yuv --input-res 640x360 --fps 30 --preset fast --bitrate 500 --pass 1 --frames 90 --stats test4.stats -o test4_pass1.hevc
            - ./x265 --input test_640x360.yuv --input-res 640x360 --fps 30 --preset fast --bitrate 500 --pass 2 --frames 90 --stats test4.stats -o test4_pass2.hevc
            - ls -lh test4_pass2.hevc
            
            # Test 5: HD resolution
            - echo "Test 5: HD 1280x720 encoding..."
            - ffmpeg -f lavfi -i testsrc=duration=2:size=1280x720:rate=30 -pix_fmt yuv420p test_1280x720.yuv -y
            - ./x265 --input test_1280x720.yuv --input-res 1280x720 --fps 30 --preset ultrafast --crf 28 --frames 60 -o test5_hd.hevc
            - ls -lh test5_hd.hevc
            
            # Verify all outputs
            - echo "=== Encoding Test Summary ==="
            - ffmpeg -i test1_fast.hevc -f null - 2>&1 | grep -i "frame="
            - ffmpeg -i test2_medium.hevc -f null - 2>&1 | grep -i "frame="
            - ffmpeg -i test3_cbr.hevc -f null - 2>&1 | grep -i "frame="
            - ffmpeg -i test4_pass2.hevc -f null - 2>&1 | grep -i "frame="
            - ffmpeg -i test5_hd.hevc -f null - 2>&1 | grep -i "frame="
            - echo "✓ All encoding tests completed successfully"
            
            # Check assembly optimizations
            - echo "=== Assembly Optimizations ==="
            - ldd x265 | grep -i numa && echo "NUMA support detected" || echo "NUMA support not linked"
            - ./x265 --version 2>&1 | grep -i asm || echo "Assembly info not available"
            
            # Build 10-bit version
            - echo "=== Building x265 (10-bit) ==="
            - cd ..
            - mkdir -p build-10bit
            - cd build-10bit
            - cmake -DCMAKE_BUILD_TYPE=Release -DHIGH_BIT_DEPTH=ON -DENABLE_CLI=OFF -DENABLE_SHARED=OFF ..
            - time make -j$(nproc)
            
            # Build 12-bit version
            - echo "=== Building x265 (12-bit) ==="
            - cd ..
            - mkdir -p build-12bit
            - cd build-12bit
            - cmake -DCMAKE_BUILD_TYPE=Release -DHIGH_BIT_DEPTH=ON -DMAIN12=ON -DENABLE_CLI=OFF -DENABLE_SHARED=OFF ..
            - time make -j$(nproc)
            
            # Summary
            - echo "=== Build Summary ==="
            - ls -lh ../build/x265
            - ls -lh ../build/libx265.so*
            - ls -lh ../build-10bit/libx265.a
            - ls -lh ../build-12bit/libx265.a
            - echo "All builds completed successfully!"
          artifacts:
            - source/build/x265
            - source/build/libx265.so*
            - source/build-10bit/libx265.a
            - source/build-12bit/libx265.a
            - source/build/test/TestBench

  # Pull requests pipeline
  pull-requests:
    '**':
      - step:
          name: PR Build and Test
          script:
            - apt-get update
            - apt-get install -y build-essential cmake nasm yasm git libnuma-dev
            - echo "=== Building x265 for PR ==="
            - cd source
            - mkdir -p build
            - cd build
            - cmake -DCMAKE_BUILD_TYPE=Release -DENABLE_TESTS=ON -DENABLE_CLI=ON -DENABLE_SHARED=ON ..
            - make -j$(nproc)
            - echo "=== Running Tests ==="
            - echo "Running TestBench correctness tests..."
            - ./test/TestBench --nobench && echo "✓ Tests PASSED" || TEST_RESULT=$?
            - |
              if [ -n "$TEST_RESULT" ]; then
                echo "✗ Tests FAILED with exit code $TEST_RESULT"
                echo "PR needs test fixes before merge"
                exit 1
              fi
            - ./x265 --version
            
            # Functional encoding test for PRs
            - echo "=== Functional Encoding Test ==="
            - apt-get install -y ffmpeg
            - ffmpeg -f lavfi -i testsrc=duration=1:size=320x240:rate=30 -pix_fmt yuv420p test.yuv -y
            - ./x265 --input test.yuv --input-res 320x240 --fps 30 --preset ultrafast --crf 28 --frames 30 -o test.hevc || ENCODE_RESULT=$?
            - |
              if [ -n "$ENCODE_RESULT" ]; then
                echo "✗ Encoding FAILED"
                echo "PR breaks encoding functionality"
                exit 1
              fi
            - echo "✓ Encoding test passed"
