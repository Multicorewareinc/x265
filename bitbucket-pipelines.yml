image: ubuntu:22.04

options:
  runner:
    type: self.hosted

pipelines:
  default:
    - step:
        name: Self-hosted runner echo test
        runs-on:
          - self.hosted
        script:
          - echo "✅ Pipeline is running on SELF-HOSTED runner"
          - echo "Hostname: $(hostname)"
          - echo "User: $(whoami)"
          - echo "Working dir: $(pwd)"
          - date
          - sleep 5