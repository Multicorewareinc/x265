# Bitbucket Pipelines configuration for x265
# Production-grade CI/CD with comprehensive testing, reporting, and security scanning

image: ubuntu:22.04


definitions:
  caches:
    build: source/build
    build-8bit: source/build-8bit
    build-10bit: source/build-10bit
    build-12bit: source/build-12bit
    coverage: coverage_data
  
  services:
    docker:
      memory: 2048

pipelines:
  # Default pipeline for manual runs and commits
  default:
    - step:
        name: Build and Test x265
        runs-on:
          - self.hosted
        caches:
          - build
          - coverage
        script:
          # Fail fast on errors
          - set -euo pipefail
          # Set non-interactive mode to avoid prompts
          - export DEBIAN_FRONTEND=noninteractive
          # Install build dependencies + analysis tools
          - apt-get update
          - apt-get install -y build-essential cmake nasm yasm git libnuma-dev python3 python3-pip bc lcov cppcheck jq ffmpeg debsecan
              python3
              python3-pip
              bc
              lcov
              cppcheck
              binutils
          
          # Set repository root for reliable path resolution
          - export REPO_ROOT="$(pwd)"
          - echo "Repository root: $REPO_ROOT"
          - ls -la "$REPO_ROOT/.ci" | head -10
          
          # Load CI helper scripts (POSIX-safe)
          - find "$REPO_ROOT/.ci" -type f \( -name "*.sh" -o -name "*.py" \) -exec chmod +x {} +
          - apt-get install -y jq  # For JSON processing
          - . "$REPO_ROOT/.ci/test_with_retry.sh"
          - . "$REPO_ROOT/.ci/results_logger.sh"
          
          # Display versions for debugging
          - echo "=== Build Environment ==="
          - gcc --version
          - cmake --version
          - nasm --version
          
          # Build x265 (8-bit) with coverage
          - echo "=== Building x265 (8-bit) with coverage ==="
          - cd source
          - mkdir -p build
          - cd build
          - cmake -DCMAKE_BUILD_TYPE=RelWithDebInfo -DENABLE_TESTS=ON -DENABLE_CLI=ON -DENABLE_SHARED=ON -DCMAKE_CXX_FLAGS="--coverage" -DCMAKE_C_FLAGS="--coverage" ..
          - make -j$(nproc) || (echo "Build failed!" && exit 1)
          
          # Run unit tests with retry logic and fail on error
          - echo "=== Running Unit Tests with Retry Logic ==="
          - echo "Available SIMD architectures:"
          - ./test/TestBench --cpuid list || true
          - echo "Running correctness tests (with retry on failure)..."
          - run_with_retry "TestBench-Correctness" "./test/TestBench --nobench" || (echo "FATAL TestBench failed after retries" && exit 1)
          - echo "Running pixel benchmarks (with retry)..."
          - run_with_retry "TestBench-Pixel" "./test/TestBench --testbench pixel" || echo "Pixel benchmarks failed but continuing"
          - echo "Running transforms benchmarks (with retry)..."
          - run_with_retry "TestBench-Transforms" "./test/TestBench --testbench transforms" || echo "Transform benchmarks failed but continuing"
          
          # Test CLI with various options
          - echo "=== Testing CLI Binary ==="
          - ./x265 --version
          - ./x265 --help | head -20
          
          # Comprehensive encoding tests
          - echo "=== Comprehensive Encoding Tests ==="
          - apt-get install -y ffmpeg
          
          # Test 1: Basic 8-bit encoding with logging
          - 'echo "Test 1: Basic 8-bit 640x360 encoding..."'
          - ffmpeg -f lavfi -i testsrc=duration=3:size=640x360:rate=30 -pix_fmt yuv420p test_640x360.yuv -y
          - ./x265 --input test_640x360.yuv --input-res 640x360 --fps 30 --preset fast --crf 28 --frames 90 -o test1_fast.hevc 2>&1 | tee test1_fast.log
          - ls -lh test1_fast.hevc
          - log_encoding_test "Test1-Fast-640x360" "test1_fast.log" "passed"
          
          # Test 2: Different preset with logging
          - 'echo "Test 2: Medium preset encoding..."'
          - ./x265 --input test_640x360.yuv --input-res 640x360 --fps 30 --preset medium --crf 23 --frames 90 -o test2_medium.hevc 2>&1 | tee test2_medium.log
          - ls -lh test2_medium.hevc
          - log_encoding_test "Test2-Medium-640x360" "test2_medium.log" "passed"
          
          # Test 3: Bitrate mode with logging
          - 'echo "Test 3: Bitrate control (CBR)..."'
          - ./x265 --input test_640x360.yuv --input-res 640x360 --fps 30 --preset fast --bitrate 500 --frames 90 -o test3_cbr.hevc 2>&1 | tee test3_cbr.log
          - ls -lh test3_cbr.hevc
          - log_encoding_test "Test3-CBR-500kbps" "test3_cbr.log" "passed"
          
          # Test 4: Two-pass encoding with logging
          - 'echo "Test 4: Two-pass encoding..."'
          - ./x265 --input test_640x360.yuv --input-res 640x360 --fps 30 --preset fast --bitrate 500 --pass 1 --frames 90 --stats test4.stats -o test4_pass1.hevc 2>&1 | tee test4_pass1.log
          - ./x265 --input test_640x360.yuv --input-res 640x360 --fps 30 --preset fast --bitrate 500 --pass 2 --frames 90 --stats test4.stats -o test4_pass2.hevc 2>&1 | tee test4_pass2.log
          - ls -lh test4_pass2.hevc
          - log_encoding_test "Test4-TwoPass-640x360" "test4_pass2.log" "passed"
          
          # Test 5: HD resolution with logging
          - 'echo "Test 5: HD 1280x720 encoding..."'
          - ffmpeg -f lavfi -i testsrc=duration=2:size=1280x720:rate=30 -pix_fmt yuv420p test_1280x720.yuv -y
          - ./x265 --input test_1280x720.yuv --input-res 1280x720 --fps 30 --preset ultrafast --crf 28 --frames 60 -o test5_hd.hevc 2>&1 | tee test5_hd.log
          - ls -lh test5_hd.hevc
          - log_encoding_test "Test5-HD-1280x720" "test5_hd.log" "passed"
          
          # Verify all outputs (fail on error)
          - echo "=== Encoding Test Summary ==="
          - ffmpeg -i test1_fast.hevc -f null - 2>&1 | grep -i "frame=" || (echo "Test 1 validation failed" && exit 1)
          - ffmpeg -i test2_medium.hevc -f null - 2>&1 | grep -i "frame=" || (echo "Test 2 validation failed" && exit 1)
          - ffmpeg -i test3_cbr.hevc -f null - 2>&1 | grep -i "frame=" || (echo "Test 3 validation failed" && exit 1)
          - ffmpeg -i test4_pass2.hevc -f null - 2>&1 | grep -i "frame=" || (echo "Test 4 validation failed" && exit 1)
          - ffmpeg -i test5_hd.hevc -f null - 2>&1 | grep -i "frame=" || (echo "Test 5 validation failed" && exit 1)
          - echo "✓ All encoding tests completed successfully"
          
          # Generate code coverage report
          - echo "=== Generating Code Coverage Report ==="
          - cd "$REPO_ROOT"
          - lcov --capture --directory source/build --output-file coverage.info || echo "Coverage capture failed"
          - lcov --remove coverage.info '/usr/*' --output-file coverage_filtered.info || true
          - genhtml coverage_filtered.info --output-directory coverage_report || echo "Coverage HTML generation failed"
          - lcov --list coverage_filtered.info || true
          - mkdir -p coverage_data
          - cp -r coverage_report coverage_data/ || true
          - echo "Coverage report saved to coverage_data/"
          
          # Security scanning (with proper error handling)
          - echo "=== Security Vulnerability Scanning ==="
          - cd "$REPO_ROOT"
          - |
            if [ -f "$REPO_ROOT/.ci/security_scan.sh" ]; then
              bash "$REPO_ROOT/.ci/security_scan.sh" || echo "⚠️  Security scan found warnings"
            else
              echo "❌ Security scan script missing!"
            fi
          
          # Generate JUnit test report
          - echo "=== Generating JUnit Test Report ==="
          - cd "$REPO_ROOT"
          - |
            if [ -f "$REPO_ROOT/.ci/generate_junit_report.py" ]; then
              python3 "$REPO_ROOT/.ci/generate_junit_report.py" || echo "JUnit report generation skipped"
            else
              echo "⚠️  JUnit report script not found"
            fi
          
          # Performance benchmarking
          - echo "=== Performance Benchmark Tracking ==="
          - cd "$REPO_ROOT"
          - source "$REPO_ROOT/.ci/benchmark_tracker.sh" || true
          
          # Generate final results summary
          - echo "=== Generating Final Results Summary ==="
          - cd "$REPO_ROOT"
          - generate_summary
          - create_text_summary
          - create_historical_report
          
          # Display build artifacts
          - cd source/build
          - ls -lh x265
          - ls -lh libx265.so*
          
          # Show final summary
          - echo ""
          - echo "╔══════════════════════════════════════════════════════════════════════╗"
          - echo "║              BUILD COMPLETE - Results Summary Available              ║"
          - echo "╚══════════════════════════════════════════════════════════════════════╝"
          - cd ../..
          - ls -lh build_results/*.txt build_results/*.json build_results/*.csv 2>/dev/null || echo "Results in build_results/"
        artifacts:
          - source/build/x265
          - source/build/libx265.so*
          - source/build/test/TestBench
          - source/build/*.log
          - coverage_data/**
          - source/build/test-results.xml
          - benchmark_results.json
          - build_results/**
        after-script:
          - echo "=== Cleaning up workspace ==="
          - rm -rf source/build/CMakeFiles source/build/*.o source/build/test/*.o || true
          - apt-get clean || true
          - rm -rf /var/lib/apt/lists/* || true
          - df -h
          - echo "✓ Cleanup completed"

  # Multi-configuration build pipeline (8-bit, 10-bit, 12-bit)
  branches:
    master:
      - parallel:
          - step:
              name: Build x265 (8-bit)
              runs-on:
                - self.hosted
              caches:
                - build-8bit
              script:
                - set -euo pipefail
                - export DEBIAN_FRONTEND=noninteractive
                - apt-get update
                - apt-get install -y build-essential cmake nasm yasm git libnuma-dev python3 python3-pip bc jq ffmpeg
                - export REPO_ROOT="$(pwd)"
                - 'echo "Repository root: $REPO_ROOT"'
                - find "$REPO_ROOT/.ci" -type f \( -name "*.sh" -o -name "*.py" \) -exec chmod +x {} +
                - . "$REPO_ROOT/.ci/test_with_retry.sh"
                - . "$REPO_ROOT/.ci/results_logger.sh"
                - echo "=== Building 8-bit ==="
                - cd source
                - mkdir -p build-8bit
                - cd build-8bit
                - cmake -DCMAKE_BUILD_TYPE=Release -DENABLE_TESTS=ON -DENABLE_CLI=ON -DENABLE_SHARED=ON ..
                - make -j$(nproc)
                - echo "=== Running Unit Tests with Retry ==="
                - echo "Available SIMD architectures:"
                - ./test/TestBench --cpuid list || true
                - echo "Running correctness tests..."
                - run_with_retry "TestBench-Correctness" "./test/TestBench --nobench"
                - echo "Running pixel benchmarks..."
                - ./test/TestBench --testbench pixel || true
                - echo "Running transforms benchmarks..."
                - ./test/TestBench --testbench transforms || true
                - ./x265 --version
                - echo "=== Comprehensive Encoding Tests with Performance Tracking ==="
                - mkdir -p "$REPO_ROOT/build_results"
                - 'echo "Test 1: Basic 8-bit 640x360 encoding..."'
                - ffmpeg -f lavfi -i testsrc=duration=3:size=640x360:rate=30 -pix_fmt yuv420p test_640x360.yuv -y
                - ./x265 --input test_640x360.yuv --input-res 640x360 --fps 30 --preset fast --crf 28 --frames 90 -o test1_fast.hevc 2>&1 | tee test1.log
                - log_encoding_test "Test 1 (Fast)" test1.log
                - 'echo "Test 2: Medium preset encoding..."'
                - ./x265 --input test_640x360.yuv --input-res 640x360 --fps 30 --preset medium --crf 23 --frames 90 -o test2_medium.hevc 2>&1 | tee test2.log
                - log_encoding_test "Test 2 (Medium)" test2.log
                - 'echo "Test 3: Bitrate control (CBR)..."'
                - ./x265 --input test_640x360.yuv --input-res 640x360 --fps 30 --preset fast --bitrate 500 --frames 90 -o test3_cbr.hevc 2>&1 | tee test3.log
                - log_encoding_test "Test 3 (CBR)" test3.log
                - 'echo "Test 4: Two-pass encoding..."'
                - ./x265 --input test_640x360.yuv --input-res 640x360 --fps 30 --preset fast --bitrate 500 --pass 1 --frames 90 --stats test4.stats -o test4_pass1.hevc 2>&1 | tee test4_pass1.log
                - ./x265 --input test_640x360.yuv --input-res 640x360 --fps 30 --preset fast --bitrate 500 --pass 2 --frames 90 --stats test4.stats -o test4_pass2.hevc 2>&1 | tee test4_pass2.log
                - log_encoding_test "Test 4 (2-Pass)" test4_pass2.log
                - 'echo "Test 5: HD 1280x720 encoding..."'
                - ffmpeg -f lavfi -i testsrc=duration=2:size=1280x720:rate=30 -pix_fmt yuv420p test_1280x720.yuv -y
                - ./x265 --input test_1280x720.yuv --input-res 1280x720 --fps 30 --preset ultrafast --crf 28 --frames 60 -o test5_hd.hevc 2>&1 | tee test5.log
                - log_encoding_test "Test 5 (HD)" test5.log
                - echo "=== Encoding Test Summary ==="
                - ffmpeg -i test1_fast.hevc -f null - 2>&1 | grep -i "frame=" || (echo "Test 1 FAILED" && exit 1)
                - ffmpeg -i test2_medium.hevc -f null - 2>&1 | grep -i "frame=" || (echo "Test 2 FAILED" && exit 1)
                - ffmpeg -i test3_cbr.hevc -f null - 2>&1 | grep -i "frame=" || (echo "Test 3 FAILED" && exit 1)
                - ffmpeg -i test4_pass2.hevc -f null - 2>&1 | grep -i "frame=" || (echo "Test 4 FAILED" && exit 1)
                - ffmpeg -i test5_hd.hevc -f null - 2>&1 | grep -i "frame=" || (echo "Test 5 FAILED" && exit 1)
                - echo "✓ All encoding tests completed successfully"
                - cd "$REPO_ROOT"
                - |
                  if [ -f "$REPO_ROOT/.ci/security_scan.sh" ]; then
                    bash "$REPO_ROOT/.ci/security_scan.sh" || echo "Security scan completed with warnings"
                  fi
                - |
                  if [ -f "$REPO_ROOT/.ci/generate_junit_report.py" ]; then
                    python3 "$REPO_ROOT/.ci/generate_junit_report.py" || true
                  fi
                
                # Generate final summary
                - echo "=== Generating Performance Summary ==="
                - cd "$REPO_ROOT"
                - generate_summary
                - echo ""
                - echo "╔══════════════════════════════════════════════════════════════════════╗"
                - echo "║           MASTER BRANCH BUILD COMPLETE - 8-bit Results              ║"
                - echo "╚══════════════════════════════════════════════════════════════════════╝"
                - cat "$REPO_ROOT/build_results/summary.txt" || echo "Summary generation skipped"
              artifacts:
                - source/build-8bit/x265
                - source/build-8bit/libx265.so*
                - source/build-8bit/test/TestBench
                - build_results/**
              after-script:
                - echo "=== Cleaning up 8-bit build ==="
                - rm -rf source/build-8bit/CMakeFiles source/build-8bit/*.o || true
                - apt-get clean || true
                - df -h

          - step:
              name: Build x265 (10-bit)
              runs-on:
                - self.hosted
              caches:
                - build-10bit
              script:
                - set -euo pipefail
                - export DEBIAN_FRONTEND=noninteractive
                - apt-get update
                - apt-get install -y build-essential cmake nasm yasm git libnuma-dev
                - echo "=== Building 10-bit ==="
                - cd source
                - mkdir -p build-10bit
                - cd build-10bit
                - cmake -DCMAKE_BUILD_TYPE=Release -DHIGH_BIT_DEPTH=ON -DENABLE_CLI=OFF -DENABLE_SHARED=OFF ..
                - make -j$(nproc)
                
                # Validation
                - echo "=== Validating 10-bit Build ==="
                - ls -lh libx265.a
                - test -f libx265.a || (echo "❌ libx265.a not found!" && exit 1)
                - size libx265.a
                - nm libx265.a | grep -i "x265_api_get" || echo "Checking symbols..."
                - echo "✓ 10-bit library built successfully"
              artifacts:
                - source/build-10bit/libx265.a
              after-script:
                - echo "=== Cleaning up 10-bit build ==="
                - rm -rf source/build-10bit/CMakeFiles source/build-10bit/*.o || true
                - df -h

          - step:
              name: Build x265 (12-bit)
              runs-on:
                - self.hosted
              caches:
                - build-12bit
              script:
                - set -euo pipefail
                - export DEBIAN_FRONTEND=noninteractive
                - apt-get update
                - apt-get install -y build-essential cmake nasm yasm git libnuma-dev
                - echo "=== Building 12-bit ==="
                - cd source
                - mkdir -p build-12bit
                - cd build-12bit
                - cmake -DCMAKE_BUILD_TYPE=Release -DHIGH_BIT_DEPTH=ON -DMAIN12=ON -DENABLE_CLI=OFF -DENABLE_SHARED=OFF ..
                - make -j$(nproc)
                
                # Validation
                - echo "=== Validating 12-bit Build ==="
                - ls -lh libx265.a
                - test -f libx265.a || (echo "❌ libx265.a not found!" && exit 1)
                - size libx265.a
                - nm libx265.a | grep -i "x265_api_get" || echo "Checking symbols..."
                - echo "✓ 12-bit library built successfully"
              artifacts:
                - source/build-12bit/libx265.a
              after-script:
                - echo "=== Cleaning up 12-bit build ==="
                - rm -rf source/build-12bit/CMakeFiles source/build-12bit/*.o || true
                - df -h

  # Daily scheduled builds with comprehensive testing
  custom:
    daily-build:
      - step:
          name: Daily Build and Comprehensive Test
          runs-on:
            - self.hosted
          max-time: 60
          caches:
            - build
            - build-10bit
            - build-12bit
          script:
            - set -euo pipefail
            # Install dependencies
            - apt-get update
            - apt-get install -y build-essential cmake nasm yasm git libnuma-dev wget time ffmpeg
            
            # System info
            - echo "=== System Information ==="
            - uname -a
            - cat /proc/cpuinfo | grep "model name" | head -1
            - free -h
            - df -h
            
            # Build info
            - echo "=== Build Environment ==="
            - gcc --version
            - g++ --version
            - cmake --version
            - nasm --version
            
            # Build 8-bit version with tests
            - echo "=== Building x265 (8-bit) with Tests ==="
            - cd source
            - mkdir -p build
            - cd build
            - cmake -DCMAKE_BUILD_TYPE=Release -DENABLE_TESTS=ON -DENABLE_CLI=ON -DENABLE_SHARED=ON -DENABLE_LIBNUMA=ON -DENABLE_ASSEMBLY=ON -DENABLE_PIC=ON ..
            - time make -j$(nproc)
            
            # Run unit tests with detailed output
            - echo "=== Running Unit Tests ==="
            - echo "Available SIMD architectures:"
            - ./test/TestBench --cpuid list || true
            - echo "Running correctness tests (no benchmarks)..."
            - ./test/TestBench --nobench || TEST_RESULT=$?
            - echo "TestBench correctness tests completed with exit code ${TEST_RESULT:-0}"
            - echo "Running pixel benchmarks..."
            - ./test/TestBench --testbench pixel || true
            - echo "Running transforms benchmarks..."
            - ./test/TestBench --testbench transforms || true
            
            # Test CLI with various options
            - echo "=== Testing CLI Binary ==="
            - ./x265 --version
            - ./x265 --help | head -20
            
            # Comprehensive encoding tests
            - echo "=== Comprehensive Encoding Tests ==="
            - apt-get install -y ffmpeg
            
            # Test 1: Basic 8-bit encoding
            - 'echo "Test 1: Basic 8-bit 640x360 encoding..."'
            - ffmpeg -f lavfi -i testsrc=duration=3:size=640x360:rate=30 -pix_fmt yuv420p test_640x360.yuv -y
            - ./x265 --input test_640x360.yuv --input-res 640x360 --fps 30 --preset fast --crf 28 --frames 90 -o test1_fast.hevc
            - ls -lh test1_fast.hevc
            
            # Test 2: Different preset
            - 'echo "Test 2: Medium preset encoding..."'
            - ./x265 --input test_640x360.yuv --input-res 640x360 --fps 30 --preset medium --crf 23 --frames 90 -o test2_medium.hevc
            - ls -lh test2_medium.hevc
            
            # Test 3: Bitrate mode
            - 'echo "Test 3: Bitrate control (CBR)..."'
            - ./x265 --input test_640x360.yuv --input-res 640x360 --fps 30 --preset fast --bitrate 500 --frames 90 -o test3_cbr.hevc
            - ls -lh test3_cbr.hevc
            
            # Test 4: Two-pass encoding
            - 'echo "Test 4: Two-pass encoding..."'
            - ./x265 --input test_640x360.yuv --input-res 640x360 --fps 30 --preset fast --bitrate 500 --pass 1 --frames 90 --stats test4.stats -o test4_pass1.hevc
            - ./x265 --input test_640x360.yuv --input-res 640x360 --fps 30 --preset fast --bitrate 500 --pass 2 --frames 90 --stats test4.stats -o test4_pass2.hevc
            - ls -lh test4_pass2.hevc
            
            # Test 5: HD resolution
            - 'echo "Test 5: HD 1280x720 encoding..."'
            - ffmpeg -f lavfi -i testsrc=duration=2:size=1280x720:rate=30 -pix_fmt yuv420p test_1280x720.yuv -y
            - ./x265 --input test_1280x720.yuv --input-res 1280x720 --fps 30 --preset ultrafast --crf 28 --frames 60 -o test5_hd.hevc
            - ls -lh test5_hd.hevc
            
            # Verify all outputs
            - echo "=== Encoding Test Summary ==="
            - ffmpeg -i test1_fast.hevc -f null - 2>&1 | grep -i "frame="
            - ffmpeg -i test2_medium.hevc -f null - 2>&1 | grep -i "frame="
            - ffmpeg -i test3_cbr.hevc -f null - 2>&1 | grep -i "frame="
            - ffmpeg -i test4_pass2.hevc -f null - 2>&1 | grep -i "frame="
            - ffmpeg -i test5_hd.hevc -f null - 2>&1 | grep -i "frame="
            - echo "✓ All encoding tests completed successfully"
            
            # Check assembly optimizations
            - echo "=== Assembly Optimizations ==="
            - ldd x265 | grep -i numa && echo "NUMA support detected" || echo "NUMA support not linked"
            - ./x265 --version 2>&1 | grep -i asm || echo "Assembly info not available"
            
            # Build 10-bit version
            - echo "=== Building x265 (10-bit) ==="
            - cd ..
            - mkdir -p build-10bit
            - cd build-10bit
            - cmake -DCMAKE_BUILD_TYPE=Release -DHIGH_BIT_DEPTH=ON -DENABLE_CLI=OFF -DENABLE_SHARED=OFF ..
            - time make -j$(nproc)
            
            # Build 12-bit version
            - echo "=== Building x265 (12-bit) ==="
            - cd ..
            - mkdir -p build-12bit
            - cd build-12bit
            - cmake -DCMAKE_BUILD_TYPE=Release -DHIGH_BIT_DEPTH=ON -DMAIN12=ON -DENABLE_CLI=OFF -DENABLE_SHARED=OFF ..
            - time make -j$(nproc)
            
            # Summary
            - echo "=== Build Summary ==="
            - ls -lh ../build/x265
            - ls -lh ../build/libx265.so*
            - ls -lh ../build-10bit/libx265.a
            - ls -lh ../build-12bit/libx265.a
            - echo "All builds completed successfully!"
          artifacts:
            - source/build/x265
            - source/build/libx265.so*
            - source/build-10bit/libx265.a
            - source/build-12bit/libx265.a
            - source/build/test/TestBench
          after-script:
            - echo "=== Cleaning up daily build workspace ==="
            - rm -rf source/build/CMakeFiles source/build/*.o source/build/test/*.o || true
            - rm -rf source/build-10bit/CMakeFiles source/build-10bit/*.o || true
            - rm -rf source/build-12bit/CMakeFiles source/build-12bit/*.o || true
            - apt-get clean || true
            - rm -rf /var/lib/apt/lists/* /tmp/* || true
            - df -h
            - echo "✓ Daily build cleanup completed"

  # Pull requests pipeline
  pull-requests:
    '**':
      - step:
          name: PR Build and Test
          runs-on:
            - self.hosted
          caches:
            - build
            - coverage
          script:
            - set -euo pipefail
            - export DEBIAN_FRONTEND=noninteractive
            - apt-get update
            - apt-get install -y build-essential cmake nasm yasm git libnuma-dev python3 python3-pip bc lcov cppcheck jq
            - export REPO_ROOT="$(pwd)"
            - echo "Repository root: $REPO_ROOT"
            - ls -la "$REPO_ROOT/.ci"
            - find "$REPO_ROOT/.ci" -type f \( -name "*.sh" -o -name "*.py" \) -exec chmod +x {} +
            - . "$REPO_ROOT/.ci/test_with_retry.sh"
            - echo "=== Building x265 for PR (strict mode) ==="
            - cd source
            - mkdir -p build
            - cd build
            - cmake -DCMAKE_BUILD_TYPE=RelWithDebInfo -DENABLE_TESTS=ON -DENABLE_CLI=ON -DENABLE_SHARED=ON -DCMAKE_CXX_FLAGS="--coverage" -DCMAKE_C_FLAGS="--coverage" ..
            - make -j$(nproc) || (echo "❌ BUILD FAILED - PR cannot be merged" && exit 1)
            - echo "=== Running Unit Tests (STRICT with retry) ==="
            - echo "Available SIMD architectures:"
            - ./test/TestBench --cpuid list || true
            - echo "Running correctness tests with retry..."
            - run_with_retry "TestBench-Correctness" "./test/TestBench --nobench" || (echo "❌ TESTS FAILED - PR cannot be merged" && exit 1)
            - echo "Running pixel benchmarks..."
            - ./test/TestBench --testbench pixel || true
            - echo "Running transforms benchmarks..."
            - ./test/TestBench --testbench transforms || true
            - ./x265 --version
            
            # Comprehensive encoding tests for PRs (strict validation)
            - echo "=== Comprehensive Encoding Tests ==="
            - apt-get install -y ffmpeg
            
            # Test 1: Basic 8-bit encoding
            - 'echo "Test 1: Basic 8-bit 640x360 encoding..."'
            - ffmpeg -f lavfi -i testsrc=duration=3:size=640x360:rate=30 -pix_fmt yuv420p test_640x360.yuv -y
            - ./x265 --input test_640x360.yuv --input-res 640x360 --fps 30 --preset fast --crf 28 --frames 90 -o test1_fast.hevc || ENCODE_RESULT=$?
            - |
              if [ -n "$ENCODE_RESULT" ]; then
                echo "✗ Test 1 Encoding FAILED"
                exit 1
              fi
            
            # Test 2: Different preset
            - 'echo "Test 2: Medium preset encoding..."'
            - ./x265 --input test_640x360.yuv --input-res 640x360 --fps 30 --preset medium --crf 23 --frames 90 -o test2_medium.hevc || ENCODE_RESULT=$?
            - |
              if [ -n "$ENCODE_RESULT" ]; then
                echo "✗ Test 2 Encoding FAILED"
                exit 1
              fi
            
            # Test 3: Bitrate mode
            - 'echo "Test 3: Bitrate control (CBR)..."'
            - ./x265 --input test_640x360.yuv --input-res 640x360 --fps 30 --preset fast --bitrate 500 --frames 90 -o test3_cbr.hevc || ENCODE_RESULT=$?
            - |
              if [ -n "$ENCODE_RESULT" ]; then
                echo "✗ Test 3 Encoding FAILED"
                exit 1
              fi
            
            # Test 4: Two-pass encoding
            - 'echo "Test 4: Two-pass encoding..."'
            - ./x265 --input test_640x360.yuv --input-res 640x360 --fps 30 --preset fast --bitrate 500 --pass 1 --frames 90 --stats test4.stats -o test4_pass1.hevc || ENCODE_RESULT=$?
            - |
              if [ -n "$ENCODE_RESULT" ]; then
                echo "✗ Test 4 Pass 1 FAILED"
                exit 1
              fi
            - ./x265 --input test_640x360.yuv --input-res 640x360 --fps 30 --preset fast --bitrate 500 --pass 2 --frames 90 --stats test4.stats -o test4_pass2.hevc || ENCODE_RESULT=$?
            - |
              if [ -n "$ENCODE_RESULT" ]; then
                echo "✗ Test 4 Pass 2 FAILED"
                exit 1
              fi
            
            # Test 5: HD resolution
            - 'echo "Test 5: HD 1280x720 encoding..."'
            - ffmpeg -f lavfi -i testsrc=duration=2:size=1280x720:rate=30 -pix_fmt yuv420p test_1280x720.yuv -y
            - ./x265 --input test_1280x720.yuv --input-res 1280x720 --fps 30 --preset ultrafast --crf 28 --frames 60 -o test5_hd.hevc || ENCODE_RESULT=$?
            - |
              if [ -n "$ENCODE_RESULT" ]; then
                echo "✗ Test 5 Encoding FAILED"
                exit 1
              fi
            
            # Verify all outputs (strict - must pass)
            - echo "=== Encoding Test Summary (STRICT) ==="
            - ffmpeg -i test1_fast.hevc -f null - 2>&1 | grep -i "frame=" || (echo "❌ Test 1 validation FAILED" && exit 1)
            - ffmpeg -i test2_medium.hevc -f null - 2>&1 | grep -i "frame=" || (echo "❌ Test 2 validation FAILED" && exit 1)
            - ffmpeg -i test3_cbr.hevc -f null - 2>&1 | grep -i "frame=" || (echo "❌ Test 3 validation FAILED" && exit 1)
            - ffmpeg -i test4_pass2.hevc -f null - 2>&1 | grep -i "frame=" || (echo "❌ Test 4 validation FAILED" && exit 1)
            - ffmpeg -i test5_hd.hevc -f null - 2>&1 | grep -i "frame=" || (echo "❌ Test 5 validation FAILED" && exit 1)
            - echo "✓ All encoding tests completed successfully"
            
            # Code coverage report
            - echo "=== Generating Coverage Report ==="
            - cd "$REPO_ROOT"
            - lcov --capture --directory source/build --output-file coverage.info || true
            - lcov --remove coverage.info '/usr/*' --output-file coverage_filtered.info || true
            - lcov --list coverage_filtered.info || true
            - mkdir -p coverage_data
            - genhtml coverage_filtered.info --output-directory coverage_data/coverage_report || true
            
            # Security scanning (STRICT - must pass for PR)
            - echo "=== Security Scanning (STRICT) ==="
            - cd "$REPO_ROOT"
            - |
              if [ -f "$REPO_ROOT/.ci/security_scan.sh" ]; then
                bash "$REPO_ROOT/.ci/security_scan.sh" || (echo "❌ Security scan found issues" && exit 1)
              else
                echo "❌ Security scan script missing!"
                exit 1
              fi
            
            # Generate test reports
            - echo "=== Generating Test Reports ==="
            - cd "$REPO_ROOT"
            - |
              if [ -f "$REPO_ROOT/.ci/generate_junit_report.py" ]; then
                python3 "$REPO_ROOT/.ci/generate_junit_report.py" || true
              fi
            
            # Final summary
            - echo "=============================================="
            - echo "✅ PR VALIDATION PASSED"
            - echo "=============================================="
            - echo "All tests, security scans, and validations passed"
            - echo "This PR is ready to merge"
          artifacts:
            - source/build/x265
            - source/build/test/TestBench
            - source/build/test-results.xml
            - coverage_data/**
          after-script:
            - echo "=== Cleaning up PR build workspace ==="
            - rm -rf source/build/CMakeFiles source/build/*.o source/build/test/*.o || true
            - apt-get clean || true
            - rm -rf /var/lib/apt/lists/* /tmp/* || true
            - df -h
            - echo "✓ PR build cleanup completed"