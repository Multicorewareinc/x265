# ═══════════════════════════════════════════════════════════════════════
#  Bitbucket Pipelines – x265 CI/CD
#  Shared YAML anchors defined once, reused across all pipeline triggers.
# ═══════════════════════════════════════════════════════════════════════

image: ubuntu:22.04

definitions:
  caches:
    build-8bit: source/build-8bit
    build-10bit: source/build-10bit
    build-12bit: source/build-12bit
    coverage: coverage_data

  services:
    docker:
      memory: 2048

  # ── Reusable YAML anchors ────────────────────────────────────────
  # Bitbucket ignores unknown keys under 'definitions'; the YAML
  # parser still resolves anchors so they can be referenced anywhere.
  anchors:

    # ── Package installation ───────────────────────────────────────
    - &install-all-deps |
        apt-get update
        apt-get install -y --no-install-recommends \
          build-essential cmake nasm yasm git libnuma-dev \
          python3 python3-pip bc jq ffmpeg \
          lcov cppcheck binutils

    - &install-build-deps |
        apt-get update
        apt-get install -y --no-install-recommends \
          build-essential cmake nasm yasm git libnuma-dev

    # ── CI helper scripts ──────────────────────────────────────────
    - &load-ci-helpers |
        find "$REPO_ROOT/.ci" -type f \( -name "*.sh" -o -name "*.py" \) \
          -exec chmod +x {} +
        . "$REPO_ROOT/.ci/test_with_retry.sh"
        . "$REPO_ROOT/.ci/results_logger.sh"

    # ── Build environment info ─────────────────────────────────────
    - &print-build-env |
        echo "=== Build Environment ==="
        gcc --version | head -1
        cmake --version | head -1
        nasm --version | head -1

    # ── Unit tests (with retry) ────────────────────────────────────
    - &run-unit-tests |
        echo "=== Unit Tests ==="
        echo "Available SIMD:"
        ./test/TestBench --cpuid list || true
        echo "Correctness tests (with retry)..."
        run_with_retry "TestBench-Correctness" "./test/TestBench --nobench"
        echo "Pixel benchmarks..."
        ./test/TestBench --testbench pixel || true
        echo "Transform benchmarks..."
        ./test/TestBench --testbench transforms || true

    # ── Encoding tests ─────────────────────────────────────────────
    - &run-encoding-tests |
        echo "=== Encoding Tests ==="
        mkdir -p "$REPO_ROOT/build_results"

        echo "Generating test inputs..."
        ffmpeg -f lavfi -i testsrc=duration=3:size=640x360:rate=30 \
          -pix_fmt yuv420p test_640x360.yuv -y
        ffmpeg -f lavfi -i testsrc=duration=2:size=1280x720:rate=30 \
          -pix_fmt yuv420p test_1280x720.yuv -y

        echo "Test 1: 640x360 fast preset..."
        ./x265 --input test_640x360.yuv --input-res 640x360 --fps 30 \
          --preset fast --crf 28 --frames 90 \
          -o test1_fast.hevc 2>&1 | tee test1.log
        log_encoding_test "Test1-Fast-640x360" test1.log "passed"

        echo "Test 2: 640x360 medium preset..."
        ./x265 --input test_640x360.yuv --input-res 640x360 --fps 30 \
          --preset medium --crf 23 --frames 90 \
          -o test2_medium.hevc 2>&1 | tee test2.log
        log_encoding_test "Test2-Medium-640x360" test2.log "passed"

        echo "Test 3: CBR 500 kbps..."
        ./x265 --input test_640x360.yuv --input-res 640x360 --fps 30 \
          --preset fast --bitrate 500 --frames 90 \
          -o test3_cbr.hevc 2>&1 | tee test3.log
        log_encoding_test "Test3-CBR-500kbps" test3.log "passed"

        echo "Test 4: Two-pass encoding..."
        ./x265 --input test_640x360.yuv --input-res 640x360 --fps 30 \
          --preset fast --bitrate 500 --pass 1 --frames 90 \
          --stats test4.stats -o test4_pass1.hevc 2>&1 | tee test4_pass1.log
        ./x265 --input test_640x360.yuv --input-res 640x360 --fps 30 \
          --preset fast --bitrate 500 --pass 2 --frames 90 \
          --stats test4.stats -o test4_pass2.hevc 2>&1 | tee test4_pass2.log
        log_encoding_test "Test4-TwoPass-640x360" test4_pass2.log "passed"

        echo "Test 5: HD 1280x720 ultrafast..."
        ./x265 --input test_1280x720.yuv --input-res 1280x720 --fps 30 \
          --preset ultrafast --crf 28 --frames 60 \
          -o test5_hd.hevc 2>&1 | tee test5.log
        log_encoding_test "Test5-HD-1280x720" test5.log "passed"

    # ── Validate encoded outputs ───────────────────────────────────
    - &validate-encoding-outputs |
        echo "=== Validating Encoded Outputs ==="
        for hevc in test1_fast.hevc test2_medium.hevc test3_cbr.hevc \
                     test4_pass2.hevc test5_hd.hevc; do
          ffmpeg -i "$hevc" -f null - 2>&1 | grep -qi "frame=" \
            || { echo "FAIL: $hevc validation failed"; exit 1; }
          echo "  OK: $hevc"
        done
        echo "All encoding outputs validated"

    # ── Code-coverage report ───────────────────────────────────────
    - &generate-coverage |
        echo "=== Code Coverage Report ==="
        cd "$REPO_ROOT"
        lcov --capture --directory source/build-8bit \
          --output-file coverage.info --quiet || true
        lcov --remove coverage.info '/usr/*' \
          --output-file coverage_filtered.info --quiet || true
        genhtml coverage_filtered.info \
          --output-directory coverage_report --quiet || true
        lcov --list coverage_filtered.info 2>/dev/null || true
        mkdir -p coverage_data
        cp -r coverage_report coverage_data/ 2>/dev/null || true

    # ── Security scan (strict – fails the step on issues) ──────────
    - &security-scan-strict |
        echo "=== Security Scanning (strict) ==="
        cd "$REPO_ROOT"
        if [ -f "$REPO_ROOT/.ci/security_scan.sh" ]; then
          bash "$REPO_ROOT/.ci/security_scan.sh"
        else
          echo "Security scan script missing at .ci/security_scan.sh"
          exit 1
        fi

    # ── Security scan (lenient – warns but does not fail) ──────────
    - &security-scan-lenient |
        echo "=== Security Scanning ==="
        cd "$REPO_ROOT"
        if [ -f "$REPO_ROOT/.ci/security_scan.sh" ]; then
          bash "$REPO_ROOT/.ci/security_scan.sh" \
            || echo "Security scan completed with warnings"
        else
          echo "Security scan script not found, skipping"
        fi

    # ── Reports & results summary ──────────────────────────────────
    - &generate-reports |
        echo "=== Generating Reports ==="
        cd "$REPO_ROOT"
        if [ -f "$REPO_ROOT/.ci/generate_junit_report.py" ]; then
          python3 "$REPO_ROOT/.ci/generate_junit_report.py" \
            || echo "JUnit report generation failed"
        fi
        generate_summary || true
        create_text_summary || true
        create_historical_report || true

    # ── 10-bit library build ───────────────────────────────────────
    - &build-10bit |
        echo "=== Building 10-bit Library ==="
        cd "$REPO_ROOT/source"
        mkdir -p build-10bit && cd build-10bit
        cmake -DCMAKE_BUILD_TYPE=Release \
          -DHIGH_BIT_DEPTH=ON \
          -DENABLE_CLI=OFF \
          -DENABLE_SHARED=OFF ..
        make -j$(nproc)
        test -f libx265.a || { echo "libx265.a not found!"; exit 1; }
        ls -lh libx265.a
        nm libx265.a | grep -i "x265_api_get" || true
        echo "10-bit library built successfully"

    # ── 12-bit library build ───────────────────────────────────────
    - &build-12bit |
        echo "=== Building 12-bit Library ==="
        cd "$REPO_ROOT/source"
        mkdir -p build-12bit && cd build-12bit
        cmake -DCMAKE_BUILD_TYPE=Release \
          -DHIGH_BIT_DEPTH=ON \
          -DMAIN12=ON \
          -DENABLE_CLI=OFF \
          -DENABLE_SHARED=OFF ..
        make -j$(nproc)
        test -f libx265.a || { echo "libx265.a not found!"; exit 1; }
        ls -lh libx265.a
        nm libx265.a | grep -i "x265_api_get" || true
        echo "12-bit library built successfully"

    # ── Workspace cleanup (safe for after-script) ──────────────────
    - &cleanup |
        set +e
        echo "=== Cleaning Up ==="
        rm -rf source/build-8bit/CMakeFiles  source/build-8bit/*.o  source/build-8bit/test/*.o  2>/dev/null
        rm -rf source/build-10bit/CMakeFiles source/build-10bit/*.o 2>/dev/null
        rm -rf source/build-12bit/CMakeFiles source/build-12bit/*.o 2>/dev/null
        find . \( -name "*.yuv" -o -name "*.stats" \) -delete 2>/dev/null
        apt-get clean 2>/dev/null
        rm -rf /var/lib/apt/lists/* /tmp/* 2>/dev/null
        df -h
        echo "Cleanup completed"


# ═══════════════════════════════════════════════════════════════════════
#  PIPELINES
# ═══════════════════════════════════════════════════════════════════════
pipelines:

  # ── Default (every push except master) ───────────────────────────
  default:
    - step:
        name: "Build, Test & Validate"
        runs-on:
          - self.hosted
        max-time: 45
        caches:
          - build-8bit
          - coverage
        script:
          - set -euo pipefail
          - export DEBIAN_FRONTEND=noninteractive
          - export REPO_ROOT="$(pwd)"
          - *install-all-deps
          - *load-ci-helpers
          - *print-build-env

          # Build 8-bit with coverage instrumentation
          - |
            echo "=== Building x265 (8-bit) with Coverage ==="
            cd source && mkdir -p build-8bit && cd build-8bit
            cmake -DCMAKE_BUILD_TYPE=RelWithDebInfo \
              -DENABLE_TESTS=ON -DENABLE_CLI=ON -DENABLE_SHARED=ON \
              -DCMAKE_CXX_FLAGS="--coverage" -DCMAKE_C_FLAGS="--coverage" ..
            make -j$(nproc)

          - cd "$REPO_ROOT/source/build-8bit"
          - *run-unit-tests
          - ./x265 --version
          - *run-encoding-tests
          - *validate-encoding-outputs
          - *generate-coverage
          - *security-scan-lenient
          - *generate-reports

          - |
            cd "$REPO_ROOT"
            . "$REPO_ROOT/.ci/benchmark_tracker.sh" || true

          - |
            echo ""
            echo "=========================================="
            echo "  BUILD COMPLETE - Results Available"
            echo "=========================================="
            cd "$REPO_ROOT/source/build-8bit"
            ls -lh x265 libx265.so* 2>/dev/null || true

        artifacts:
          - source/build-8bit/x265
          - source/build-8bit/libx265.so*
          - source/build-8bit/test/TestBench
          - coverage_data/**
          - source/build-8bit/test-results.xml
          - benchmark_results.json
          - build_results/**
        after-script:
          - *cleanup

  # ── Master branch – parallel 8 / 10 / 12-bit builds ─────────────
  branches:
    master:
      - parallel:
          - step:
              name: "Master: 8-bit Build + Full Tests"
              runs-on:
                - self.hosted
              max-time: 45
              caches:
                - build-8bit
              script:
                - set -euo pipefail
                - export DEBIAN_FRONTEND=noninteractive
                - export REPO_ROOT="$(pwd)"
                - *install-all-deps
                - *load-ci-helpers
                - *print-build-env

                # Build 8-bit Release
                - |
                  echo "=== Building x265 (8-bit) Release ==="
                  cd source && mkdir -p build-8bit && cd build-8bit
                  cmake -DCMAKE_BUILD_TYPE=Release \
                    -DENABLE_TESTS=ON -DENABLE_CLI=ON -DENABLE_SHARED=ON ..
                  make -j$(nproc)

                - cd "$REPO_ROOT/source/build-8bit"
                - *run-unit-tests
                - ./x265 --version
                - *run-encoding-tests
                - *validate-encoding-outputs
                - *security-scan-lenient
                - *generate-reports

                - |
                  echo ""
                  echo "=========================================="
                  echo "  MASTER 8-BIT BUILD COMPLETE"
                  echo "=========================================="

              artifacts:
                - source/build-8bit/x265
                - source/build-8bit/libx265.so*
                - source/build-8bit/test/TestBench
                - build_results/**
              after-script:
                - *cleanup

          - step:
              name: "Master: 10-bit Library"
              runs-on:
                - self.hosted
              max-time: 20
              caches:
                - build-10bit
              script:
                - set -euo pipefail
                - export DEBIAN_FRONTEND=noninteractive
                - export REPO_ROOT="$(pwd)"
                - *install-build-deps
                - *build-10bit
              artifacts:
                - source/build-10bit/libx265.a
              after-script:
                - *cleanup

          - step:
              name: "Master: 12-bit Library"
              runs-on:
                - self.hosted
              max-time: 20
              caches:
                - build-12bit
              script:
                - set -euo pipefail
                - export DEBIAN_FRONTEND=noninteractive
                - export REPO_ROOT="$(pwd)"
                - *install-build-deps
                - *build-12bit
              artifacts:
                - source/build-12bit/libx265.a
              after-script:
                - *cleanup

  # ── Custom: daily comprehensive build ────────────────────────────
  custom:
    daily-build:
      - step:
          name: "Daily: Full Build + All Bit Depths"
          runs-on:
            - self.hosted
          max-time: 60
          caches:
            - build-8bit
            - build-10bit
            - build-12bit
          script:
            - set -euo pipefail
            - export DEBIAN_FRONTEND=noninteractive
            - export REPO_ROOT="$(pwd)"
            - *install-all-deps
            - *load-ci-helpers

            # System info
            - |
              echo "=== System Information ==="
              uname -a
              grep "model name" /proc/cpuinfo | head -1 || true
              free -h
              df -h

            - *print-build-env

            # Build 8-bit Release with all optimisations
            - |
              echo "=== Building x265 (8-bit) Release ==="
              cd source && mkdir -p build-8bit && cd build-8bit
              cmake -DCMAKE_BUILD_TYPE=Release \
                -DENABLE_TESTS=ON -DENABLE_CLI=ON -DENABLE_SHARED=ON \
                -DENABLE_LIBNUMA=ON -DENABLE_ASSEMBLY=ON -DENABLE_PIC=ON ..
              time make -j$(nproc)

            - cd "$REPO_ROOT/source/build-8bit"
            - *run-unit-tests
            - ./x265 --version
            - *run-encoding-tests
            - *validate-encoding-outputs

            # Assembly / NUMA check
            - |
              ldd x265 | grep -i numa && echo "NUMA support detected" || echo "No NUMA linkage"
              ./x265 --version 2>&1 | grep -i asm || true

            # 10-bit and 12-bit libraries
            - *build-10bit
            - *build-12bit

            # Summary
            - |
              echo "=== Build Summary ==="
              ls -lh "$REPO_ROOT/source/build-8bit/x265"
              ls -lh "$REPO_ROOT/source/build-8bit"/libx265.so* 2>/dev/null || true
              ls -lh "$REPO_ROOT/source/build-10bit/libx265.a"
              ls -lh "$REPO_ROOT/source/build-12bit/libx265.a"
              echo "All daily builds completed successfully"

          artifacts:
            - source/build-8bit/x265
            - source/build-8bit/libx265.so*
            - source/build-8bit/test/TestBench
            - source/build-10bit/libx265.a
            - source/build-12bit/libx265.a
            - build_results/**
          after-script:
            - *cleanup

  # ── Pull Requests (strict – must pass to merge) ─────────────────
  pull-requests:
    '**':
      - step:
          name: "PR: Build, Test & Validate (strict)"
          runs-on:
            - self.hosted
          max-time: 45
          caches:
            - build-8bit
            - coverage
          script:
            - set -euo pipefail
            - export DEBIAN_FRONTEND=noninteractive
            - export REPO_ROOT="$(pwd)"
            - *install-all-deps
            - *load-ci-helpers
            - *print-build-env

            # Build 8-bit with coverage (strict – any failure aborts)
            - |
              echo "=== Building x265 (8-bit) for PR ==="
              cd source && mkdir -p build-8bit && cd build-8bit
              cmake -DCMAKE_BUILD_TYPE=RelWithDebInfo \
                -DENABLE_TESTS=ON -DENABLE_CLI=ON -DENABLE_SHARED=ON \
                -DCMAKE_CXX_FLAGS="--coverage" -DCMAKE_C_FLAGS="--coverage" ..
              make -j$(nproc)

            - cd "$REPO_ROOT/source/build-8bit"
            - *run-unit-tests
            - ./x265 --version
            - *run-encoding-tests
            - *validate-encoding-outputs
            - *generate-coverage
            - *security-scan-strict
            - *generate-reports

            - |
              echo "=============================================="
              echo "  PR VALIDATION PASSED"
              echo "=============================================="
              echo "All tests, security scans, and validations passed."
              echo "This PR is ready to merge."

          artifacts:
            - source/build-8bit/x265
            - source/build-8bit/test/TestBench
            - source/build-8bit/test-results.xml
            - coverage_data/**
            - build_results/**
          after-script:
            - *cleanup
